<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Platformer Game</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#222;
}

canvas{
  display:block;
  margin:auto;
  background:#87CEEB;
}
</style>

</head>

<body>

<canvas id="game" width="800" height="400"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gravity = 0.6;

let score = 0;
let gameWon = false;

const worldWidth = 2000;

const player = {
  x:50,
  y:300,
  width:30,
  height:30,
  dx:0,
  dy:0,
  speed:4,
  jump:-12,
  onGround:false
};

let cameraX = 0;

const keys = {};

const platforms = [
  {x:0,y:370,width:2000,height:30},
  {x:200,y:300,width:120,height:20},
  {x:450,y:260,width:120,height:20},
  {x:700,y:230,width:120,height:20},
  {x:1000,y:280,width:120,height:20},
  {x:1300,y:250,width:120,height:20},
  {x:1600,y:220,width:120,height:20}
];

const coins = [
  {x:230,y:260,collected:false},
  {x:480,y:220,collected:false},
  {x:730,y:190,collected:false},
  {x:1030,y:240,collected:false},
  {x:1330,y:210,collected:false},
  {x:1630,y:180,collected:false}
];

const flag = {
  x:1850,
  y:310,
  width:20,
  height:60
};

document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

function update(){

  if(gameWon) return;

  // Horizontal movement
  if(keys["ArrowLeft"] || keys["KeyA"]) player.dx = -player.speed;
  else if(keys["ArrowRight"] || keys["KeyD"]) player.dx = player.speed;
  else player.dx = 0;

  // Jump
  if((keys["Space"] || keys["ArrowUp"]) && player.onGround){
    player.dy = player.jump;
    player.onGround = false;
  }

  player.dy += gravity;

  player.x += player.dx;
  player.y += player.dy;

  player.onGround = false;

  // Platform collisions
  platforms.forEach(p => {
    if(
      player.x < p.x + p.width &&
      player.x + player.width > p.x &&
      player.y < p.y + p.height &&
      player.y + player.height > p.y
    ){
      if(player.dy >= 0){
        player.y = p.y - player.height;
        player.dy = 0;
        player.onGround = true;
      }
    }
  });

  // Coin collection
  coins.forEach(c => {
    if(!c.collected){
      if(
        player.x < c.x + 15 &&
        player.x + player.width > c.x &&
        player.y < c.y + 15 &&
        player.y + player.height > c.y
      ){
        c.collected = true;
        score++;
      }
    }
  });

  // Flag / win condition
  if(
    player.x < flag.x + flag.width &&
    player.x + player.width > flag.x &&
    player.y < flag.y + flag.height &&
    player.y + player.height > flag.y
  ){
    gameWon = true;
  }

  // Prevent going off the world
  if(player.x < 0) player.x = 0;
  if(player.x + player.width > worldWidth) player.x = worldWidth - player.width;
  if(player.y + player.height > canvas.height){
    player.y = canvas.height - player.height;
    player.dy = 0;
    player.onGround = true;
  }
  if(player.y < 0){
    player.y = 0;
    player.dy = 0;
  }

  // Camera follows player
  cameraX = player.x - canvas.width / 2;
  if(cameraX < 0) cameraX = 0;
  if(cameraX > worldWidth - canvas.width) cameraX = worldWidth - canvas.width;

}

function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(-cameraX,0);

  // Platforms
  ctx.fillStyle = "green";
  platforms.forEach(p=>{
    ctx.fillRect(p.x,p.y,p.width,p.height);
  });

  // Coins
  coins.forEach(c=>{
    if(!c.collected){
      ctx.beginPath();
      ctx.arc(c.x+7,c.y+7,7,0,Math.PI*2);
      ctx.fillStyle="gold";
      ctx.fill();
    }
  });

  // Flag
  ctx.fillStyle="black";
  ctx.fillRect(flag.x,flag.y,flag.width,flag.height);

  // Player
  ctx.fillStyle="red";
  ctx.fillRect(player.x,player.y,player.width,player.height);

  ctx.restore();

  // HUD / score
  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("Score: "+score,20,30);

  if(gameWon){
    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("YOU WIN!",320,200);
  }

}

function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
